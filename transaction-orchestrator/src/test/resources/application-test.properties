# Test configuration — overrides application.properties for the test slice
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true

# Disable scheduling and async during slice tests (individual test files will enable when needed)
spring.task.execution.pool.core-size=1

# Cache: use a simple in-memory cache for unit/slice tests (not Redis)
spring.cache.type=simple

# Disable Redis auto-configuration for controller slice tests
spring.data.redis.repositories.enabled=false

# Logging
logging.level.org.springframework=WARN
logging.level.com.tumipay=DEBUG
logging.level.org.testcontainers=INFO
logging.level.org.flywaydb=WARN
